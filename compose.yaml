# Saki — Notion 백엔드 CalDAV 서버 (RFC 4791)
# 웹 서비스라 Traefik 라벨로 saki.oein.fyi + 와일드카드 TLS 를 붙인다.
# 상태는 Notion 에 저장되므로 로컬 볼륨은 없다.
# 도메인/TLS: docs/TRAEFIK-LABELS.md, 배포: docs/GITOPS.md
services:
  app:
    image: ghcr.io/oe2n/saki:latest
    restart: unless-stopped
    environment:
      # 값은 커밋 금지 — Komodo env / GitHub Actions(deploy-proxy)로 주입.
      - PORT=5232
      - NOTION_TOKEN=${NOTION_TOKEN:-}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID:-}
      - CALDAV_USERNAME=${CALDAV_USERNAME:-}
      - CALDAV_PASSWORD=${CALDAV_PASSWORD:-}
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      # 기본: saki.oein.fyi (와일드카드 인증서 재사용, 재발급 없음)
      - "traefik.http.routers.saki.rule=Host(`saki.oein.fyi`)"
      - "traefik.http.routers.saki.entrypoints=websecure"
      - "traefik.http.routers.saki.priority=100"
      - "traefik.http.routers.saki.tls=true"
      - "traefik.http.services.saki.loadbalancer.server.port=5232"
      # http -> https 리다이렉트
      - "traefik.http.routers.saki-web.rule=Host(`saki.oein.fyi`)"
      - "traefik.http.routers.saki-web.entrypoints=web"
      - "traefik.http.routers.saki-web.priority=100"
      - "traefik.http.routers.saki-web.middlewares=to-https@file"

networks:
  proxy:
    external: true      # docker VM 의 Traefik 공유 네트워크
