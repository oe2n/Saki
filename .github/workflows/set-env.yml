name: set-env

# 배포된 'saki' 스택의 런타임 시크릿(NOTION_TOKEN 등)을 deploy-proxy 를 통해
# Komodo env 로 밀어넣고 재배포한다. 이미지엔 안 들어간다.
on:
  workflow_dispatch: {}

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Push env to 'saki' via deploy-proxy
        env:
          PROXY_URL: ${{ secrets.DEPLOY_PROXY_URL }}
          PROXY_TOKEN: ${{ secrets.DEPLOY_PROXY_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          CALDAV_USERNAME: ${{ secrets.CALDAV_USERNAME }}
          CALDAV_PASSWORD: ${{ secrets.CALDAV_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${PROXY_URL:-}" ] || [ -z "${PROXY_TOKEN:-}" ]; then
            echo "DEPLOY_PROXY_URL/TOKEN secret 미설정"; exit 1
          fi
          payload=$(jq -n \
            --arg nt "${NOTION_TOKEN:-}" \
            --arg nd "${NOTION_DATABASE_ID:-}" \
            --arg cu "${CALDAV_USERNAME:-}" \
            --arg cp "${CALDAV_PASSWORD:-}" \
            '{env: {NOTION_TOKEN: $nt, NOTION_DATABASE_ID: $nd, CALDAV_USERNAME: $cu, CALDAV_PASSWORD: $cp}, redeploy: true}')
          echo "Pushing env to 'saki'..."
          curl -fsSL -X POST "$PROXY_URL/deploy/saki/env" \
            -H "Authorization: Bearer $PROXY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload"
          echo
